name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "saas-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "saas-backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit mypy pip-audit

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports --no-strict-optional

      - name: Security scan (bandit)
        run: bandit -r app/ -ll -q

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit --strict --desc on 2>&1 || true
        # Non-blocking for now — review output and fix critical vulns manually

      - name: Run tests with coverage
        run: pytest -q --tb=short --cov=app --cov-report=term-missing --cov-fail-under=70

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret detection (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
