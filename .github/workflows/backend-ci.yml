name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "saas-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "saas-backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit mypy pip-audit ruff

      - name: Lint critical Python errors (ruff)
        run: ruff check app tests --select E9,F63,F7,F82

      - name: Type check (mypy)
        run: mypy app/ --config-file mypy.ini

      - name: Security scan (bandit)
        run: bandit -r app/ -ll -q

      - name: Dependency vulnerability scan (pip-audit)
        run: >
          pip-audit --strict --desc on
          --ignore-vuln PYSEC-2025-185

      - name: Run tests with coverage
        run: pytest -q --tb=short --cov=app --cov-report=term-missing --cov-fail-under=65

      - name: Run critical auth and tenant tests
        run: >
          pytest -q --tb=short
          tests/test_auth_service.py
          tests/test_auth_service_full.py
          tests/test_auth_router_session_cookies.py
          tests/test_dependencies.py
          tests/test_database_tenant_guardrails.py
          tests/test_main_tenant_context.py
          tests/test_permissions.py
          tests/test_tenant_fk_guards.py

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret detection (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
