<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actuar Bridge</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 320px;
        background: #0f1220;
        color: #f5f7ff;
        font-family: Segoe UI, Arial, sans-serif;
      }
      .card {
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        background: rgba(255,255,255,0.04);
        padding: 12px;
        margin-bottom: 12px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        color: rgba(245,247,255,0.8);
      }
      .status {
        font-size: 12px;
        font-weight: 600;
        margin-top: 8px;
      }
      .ok { color: #4ade80; }
      .warn { color: #fbbf24; }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        margin-top: 10px;
        cursor: pointer;
        font-weight: 600;
      }
      .primary { background: linear-gradient(90deg, #7c3aed, #a855f7); color: white; }
      .ghost { background: rgba(255,255,255,0.08); color: white; }
      code {
        display: block;
        margin-top: 8px;
        font-size: 11px;
        color: #c7d2fe;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Actuar Bridge</h1>
      <p>Anexe explicitamente a aba do Actuar para a extensao usar a sessao ja aberta do operador.</p>
      <div id="relayStatus" class="status warn">Relay local: verificando...</div>
      <div id="tabStatus" class="status warn">Aba: nao anexada</div>
      <code id="tabMeta"></code>
      <button id="attachButton" class="primary">Anexar aba atual</button>
      <button id="detachButton" class="ghost">Desanexar</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
