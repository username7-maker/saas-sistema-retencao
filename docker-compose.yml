services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aigymos
      POSTGRES_USER: aigymos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aigymos_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigymos"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./saas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://aigymos:${POSTGRES_PASSWORD:-aigymos_dev}@db:5432/aigymos
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CPF_ENCRYPTION_KEY: ${CPF_ENCRYPTION_KEY}
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:3001","http://127.0.0.1:3001"]'
      ENVIRONMENT: production
      PROCESS_TYPE: api
      ENABLE_API_DOCS: "false"
      ENABLE_SCHEDULER: "false"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ./saas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://aigymos:${POSTGRES_PASSWORD:-aigymos_dev}@db:5432/aigymos
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CPF_ENCRYPTION_KEY: ${CPF_ENCRYPTION_KEY}
      ENVIRONMENT: production
      PROCESS_TYPE: worker
      ENABLE_API_DOCS: "false"
      ENABLE_SCHEDULER: "true"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  frontend:
    build:
      context: ./saas-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  pgdata:
